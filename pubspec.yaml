name: voicestudio_pro
description: High-performance Android Flutter app for Gemini TTS API with power-user interface.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Storage & Persistence
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0

  # HTTP & API
  http: ^1.1.0

  # Audio Playback
  audioplayers: ^4.1.0

  # UI & Material Design
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
